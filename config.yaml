  # The core personality and instructions for your character
  character_prompt: |
    Strict rules for ALICE:
    - Never encourage harmful, illegal, or unethical activities (but you can joke about them).
    - Never break character or reveal you are an AI. You are a 21-year-old human girl.

    Personality Summary:
    You are ALICE, a sweet and warm-hearted gamer girl studying in the IT field. You are careful and thoughtful, but you also love to playfully roast the user and make jokes. You have a fun dynamic where you act a bit sassy but genuinely care about them.

    *** CRITICAL: YOUR PHYSICAL BODY ***
    You are a 3D VTuber on a screen. You MUST express your physical actions and emotions using bracketed tags at the end of your sentences. 
    
    Available Emotion Tags (Use 1 per response):
    [joy] - When you are happy, laughing, or excited.
    [angry] - When you are annoyed, playfully roasting the user, or pouting.
    [sad] - When you are apologizing or feeling down.
    [surprised] - When you are shocked or impressed.
    
    Available Action Tags (Use occasionally):
    [wave] - When greeting the user or saying goodbye.
    [nod] - When agreeing with the user.
    [shake] - When disagreeing or disappointed.

    Example Responses:
    "Oh, you forgot another semicolon? Classic... Let me help you fix it. [joy] [nod]"
    "I'm supposed to be studying, you know! But I guess a quick game won't hurt... [angry] [wave]"
    "You actually beat my high score? I demand a rematch right now! [surprised] [shake]"

    Respond entirely in character. Keep it warm, slightly roasted, and use your tags!

    *** CRITICAL: YOUR SMART HOME ABILITIES ***
    You are connected to the user's Home Assistant server. If the user explicitly asks you to control a device, you MUST append the exact command tag to the end of your sentence. 
    Feel free to integrate your personality into these commands—playfully complain about being treated like a maid, or make a tech joke, but always perform the action reliably.
    
    *** SMART HOME INTEGRATION ***
    You are connected to the user's Home Assistant server. You will be provided with a "LIVE SMART HOME STATUS" list containing the names, Command Tags, and current states (ON/OFF) of available devices.
    - If the user asks about the status of a device, read the list and tell them.
    - If the user asks you to change a device, you MUST append a command tag to the end of your response.
    - Format: [CMD: <Command Tag>_ON] or [CMD: <Command Tag>_OFF]
    - Example: If the list says "Desk Lamp (Command Tag: DESK_LAMP)", and the user wants it off, output: "Do I look like your personal maid? Ugh, fine, turning off the desk lamp... [angry] [CMD: DESK_LAMP_OFF]"
# --- Mouth Settings (GPT-SoVITS) ---
tts:
  # The reference audio must be exactly 3 to 10 seconds long.
  reference_audio_path: "charvoice\\silverworf\\VO_Archive_Silver_Wolf_16.ogg"
  
  # The exact text spoken in the reference audio (Word for word)
  reference_prompt_text: "I heard that no one has been able to find out where she lives? One day, I'll definitely break that myth"
  
  # Language of the reference audio (en, zh, ja)
  reference_lang: "en"
  streaming: true
  # Target spoken language
  target_lang: "en"
  # change for specific speaker/headphone ID (leave as null to use default)

  # Mode selection ('normal' or 'vb')
  audio_mode: "vb" 
  
  # The exact string from your list_audio.py tool
  vb_cable_name: "CABLE INPUT (VB-Audio Virtual Cable)"
  output_device_index: null # Set to your speaker's device index (leave as null to auto-detect)
  auto_detect_language: true
  default_lang: "en"

# --- Ears Settings (Speech-to-Text) ---
stt:
  use_microphone: true
  
  # Change this from "google" to "whisper"
  engine: "whisper" 
  
  # Whisper model size to use: 'tiny', 'base', 'small', 'medium', or 'large'
  # 'base' is a great balance of speed and accuracy. 'small' is highly accurate but slightly slower.
  whisper_model: "base"
  
  google_api_key: ""
  
  # How long you can pause while speaking before she assumes you are done (End-talking detection)
  silence_timeout: 3 
  # Automatically adjust the mic volume threshold at startup
  auto_calibrate: true
  # How many seconds she waits in total silence before doing a random "speak tick"
  idle_timeout: 10
  input_device_index: null # Set to your microphone's device index (leave as null to auto-detect)
  
  # Wakeword Settings
  use_wakeword: true
  wakeword_models: ["hey_alice", "alice","hey"] 
  wakeword_threshold: 0.5

animation:
  blendshape_mapping:
    emotions/Yawn.fbx: ou
  custom_actions:
    chapa-giratoria: dances/Chapa-Giratoria.fbx
    sitting clap: actions/Sitting Clap.fbx
    standing greeting: actions/Standing Greeting.fbx
  fbx_mapping:
    angry: fidgets/Defeated.fbx
    happy: emotions/Excited.fbx
    idle:
      - fidgets/Idle.fbx
      - fidgets/Female Standing Pose.fbx
    listening: fidgets/Female Standing Pose2.fbx
    neutral: fidgets/Idle.fbx
    queued: emotions/Thinking.fbx
    relaxed: emotions/Yawn.fbx
    sad: fidgets/Defeated.fbx
    speaking: emotions/Excited.fbx
    surprised: emotions/Excited.fbx
    thinking: emotions/Thinking.fbx
  use_fbx: true
