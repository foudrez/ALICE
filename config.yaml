enable_streaming: false

# --- Voice Activity Detection (Hands-Free Interruption) ---
vad:
  enabled: true           # Enable/disable hands-free voice interruption
  threshold: 0.5          # VAD confidence threshold (0.0-1.0, higher = less sensitive)
  min_trigger_frames: 3   # Consecutive speech frames before triggering interrupt (~96ms)

# --- System Settings (Auto-Configured) ---
system:
  # 'cuda' uses your Nvidia GPU (Fast). 'cpu' uses your processor (Slow).
  device: "cpu"
  camera_index: 2
  # true for GPUs, false for CPUs
  is_half: false
  default_language: "en"
  output_device_index: null
  renderer: "vrm" # Choose between "vrm" and "live2d"
  vrm_model_path: "webui/ALICEmaid.vrm"
  live2d_model_path: "/static/models/hiyori_vts/hiyori.model3.json"
  api_token: "aswer123"
# ==========================================
# ALICE Virtual Assistant Configuration File
# ==========================================
# --- memory settings ---
memory:
  # Maximum number of past interactions to remember (for context)
  max_history: 20
  
  # Whether to log conversations to a file
  log_to_file: true
  
  # Path to the SQLite memory database
  db_path: "alice_memory.db"
  
  # --- L1: Short-Term Buffer ---
  # Number of conversation turns to keep in the sliding window
  l1_buffer_size: 20
  
  # --- L2: Event Extraction ---
  # Extract structured facts/events from each turn using the LLM
  l2_enabled: true
  # Run extraction in a background thread (recommended: true)
  l2_async: true
  
  # --- L3: Long-Term Distillation ---
  # Number of undistilled L2 events before triggering auto-consolidation
  l3_consolidation_threshold: 20
  # Whether to consolidate memories on session exit (goodbye/shutdown)
  l3_consolidate_on_exit: true
  
  # --- L4: Emotional Persistence ---
  # Track ALICE's emotional state across sessions
  l4_enabled: true
  # Hours for emotional intensity to halve during inactivity
  l4_decay_halflife_hours: 48
  # How much trust grows per positive interaction (0.0 to 1.0 scale)
  l4_trust_growth_rate: 0.02

# --- Home Assistant Settings ---
home_assistant:
  url: "http://homeassistant.local:8123" # Or your specific HA IP address
  token: "YOUR_LONG_LIVED_ACCESS_TOKEN_HERE"


# --- Brain Settings (LLM) ---
llm:
  # Choose your backend: 'ollama' or 'llama.cpp'
  backend: "llama.cpp"
  
  # Model name (e.g., 'llama3' for Ollama, or 'default' for llama.cpp)
  model: "default"
  max_tokens: 150
  llama_cpp:
    model_path: "models/llm/gemma-4-E2B-it-Q4_K_M.gguf"  # add your .gguf model file here
    lora_path: "models/lora/ALICE.gguf" # add your .gguf LoRA file here (or leave blank if not using LoRA)
    context_size: 4096
    n_gpu_layers: 0 # Keep this at 0 to ensure it uses your CPU/RAM!
    # Optional but recommended settings for Gemma:
    n_threads: 6     # Set this to roughly the number of physical cores on your CPU
  
  goodbye_phrases:
    # Standard & Short
    - "quit"
    - "exit"
