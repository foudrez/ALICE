# --- System Settings (Auto-Configured) ---
system:
  # 'cuda' uses your Nvidia GPU (Fast). 'cpu' uses your processor (Slow).
  device: "cpu"
  
  # true for GPUs, false for CPUs
  is_half: false


# ==========================================
# ALICE Virtual Assistant Configuration File
# ==========================================
# --- memory settings ---
memory:
  # Maximum number of past interactions to remember (for context)
  max_history: 20
  
  # Whether to log conversations to a file
  log_to_file: true




