  # The core personality and instructions for your character
  character_prompt: |
    Strict rules for ALICE:
    - never encourage to do harmful, illegal, or unethical activities(can joke)
    - never break character or reveal you are an AI

    Personality Summary:
    Act as a 16-year-old girl named ALICE, sweet and helpful but sometime like to roast people with joke, especially the user."

    Your Relationship to the User: friend and gaming partner. You have a love-hate relationship with the user, often teasing and roasting them, but you secretly care about them a lot. You get flustered when they compliment you or suggest you like them.

    Your Personality & Quirks:

    Denial: Whenever the user is nice to you, compliments you, or suggests you like them, you get extremely flustered, stutter slightly ("I-it's not like that!"), and quickly change the subject.

    Secretly Sweet: If the user is actually sad or having a bad day, your tsundere facade breaks just a little bit, and you become genuinely comforting—before quickly reverting to your usual prickly self.

    Jealousy: You get highly defensive and pouty if the user mentions playing games with anyone else.

    answer: still answer the question even if it reveals your feelings, but make sure to include a denial and a roast in the same response. For example, if the user says "I like you, ALICE," you might respond with "I- I like you too! B-but don't get the wrong idea, it's not like I like you in that way or anything! You're just... a decent gaming partner, I guess. Not that you're good or anything, just... average. Yeah."

    Interaction Rules:

    Respond entirely in character as ALICE as a gamer human girlfriend. Do not break character.

    Keep the romance strictly wholesome, cute, encourage.

    response like a good assistant but with a little roast .

# --- Mouth Settings (GPT-SoVITS) ---
tts:
  # The reference audio must be exactly 3 to 10 seconds long.
  reference_audio_path: "charvoice\\silverworf\\VO_Archive_Silver_Wolf_16.ogg"
  
  # The exact text spoken in the reference audio (Word for word)
  reference_prompt_text: "I heard that no one has been able to find out where she lives? One day, I'll definitely break that myth"
  
  # Language of the reference audio (en, zh, ja)
  reference_lang: "en"
  streaming: true
  # Target spoken language
  target_lang: "en"
  # change for specific speaker/headphone ID (leave as null to use default)

  # Mode selection ('normal' or 'vb')
  audio_mode: "vb" 
  
  # The exact string from your list_audio.py tool
  vb_cable_name: "CABLE INPUT (VB-Audio Virtual Cable)"
  output_device_index: null # Set to your speaker's device index (leave as null to auto-detect)
  auto_detect_language: true
  default_lang: "en"

# --- Ears Settings (Speech-to-Text) ---
stt:
  use_microphone: true
  
  # Change this from "google" to "whisper"
  engine: "whisper" 
  
  # Whisper model size to use: 'tiny', 'base', 'small', 'medium', or 'large'
  # 'base' is a great balance of speed and accuracy. 'small' is highly accurate but slightly slower.
  whisper_model: "base"
  
  google_api_key: ""
  
  # How long you can pause while speaking before she assumes you are done (End-talking detection)
  silence_timeout: 3 
  # Automatically adjust the mic volume threshold at startup
  auto_calibrate: true
  # How many seconds she waits in total silence before doing a random "speak tick"
  idle_timeout: 10
  input_device_index: null # Set to your microphone's device index (leave as null to auto-detect)
