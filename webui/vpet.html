<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A.L.I.C.E. Neural Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
        }
      }
    </script>
    
    <!-- Live2D Dependencies -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="ui-hint" style="position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.5); font-size: 12px; z-index: 10000; pointer-events: none;">Press 'H' to toggle Settings</div>
    
    <video id="stream-video" autoplay playsinline muted style="display:none;"></video>
    <canvas id="stream-canvas" style="display:none;"></canvas>
    
    <div id="bg-layer"></div>
    <canvas id="vrm-canvas"></canvas>
    <div id="vignette-overlay"></div>

    <div id="ui-container" class="control-panel hidden">
        <h3>⚙️ ALICE Controls</h3>
        <label for="vrm-upload" class="custom-file-upload">
            📂 Select Avatar (.vrm / .model3.json)
        </label>
        <input type="file" id="vrm-upload" accept=".vrm,.model3.json" style="display: none;" />
        
        <div class="streaming-settings" style="margin-top: 15px; margin-bottom: 15px; border-top: 1px solid #444; padding-top: 10px;">
            <h4 style="margin-top: 0; margin-bottom: 10px; font-size: 14px; font-weight: normal; color: #ccc;">Visual Engine</h4>
            <select id="renderer-select" style="width: 100%; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; margin-bottom: 15px;">
                <option value="vrm">3D VRM Engine</option>
                <option value="live2d">2D Live2D Engine</option>
            </select>
            
            <h4 style="margin-top: 0; margin-bottom: 10px; font-size: 14px; font-weight: normal; color: #ccc;">Live Context Stream</h4>
            <label style="display: block; margin-bottom: 5px;"><input type="checkbox" id="stream-camera-checkbox"> Camera</label>
            <label style="display: block; margin-bottom: 5px;"><input type="checkbox" id="stream-screen-checkbox"> Screen</label>
        </div>
        
        <button id="hide-ui-btn">👁️ Hide UI (Press 'H')</button>
    </div>

    <div id="ui-layer">
        <div id="subtitle-box">
            <div id="chat-window"></div>
            <span id="status">ALICE is listening...</span>
        </div>
        
        <div id="controls">
            <button id="ptt-btn" class="mic-btn">🎙️</button>
            <input type="text" id="user-input" placeholder="Type a message or hold mic..." autocomplete="off">
            <button id="send-btn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
