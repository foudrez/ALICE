<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A.L.I.C.E. Neural Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
        }
      }
    </script>
</head>
<body>
    <!-- 1. Background & 3D Canvas -->
    <div id="bg-layer"></div>
    <canvas id="vrm-canvas"></canvas>
    <div id="vignette-overlay"></div>

    <!-- 2. Chat & Controls Layer (Settings completely removed) -->
    <div id="ui-layer">
        <div id="subtitle-box">
            <div id="chat-window"></div>
            <span id="status">ALICE is listening...</span>
        </div>
        
        <!-- Only the Mic, Text Box, and Send button remain -->
        <div id="controls">
            <button id="ptt-btn" class="mic-btn">🎙️</button>
            <input type="text" id="user-input" placeholder="Type a message or hold mic..." autocomplete="off">
            <button id="send-btn" class="send-btn">➤</button>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
